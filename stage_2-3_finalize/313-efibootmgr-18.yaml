description: "efibootmgr package provides tools and libraries to manipulate EFI variables."

package:
  name: efibootmgr
  version: 18
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://github.com/rhboot/efibootmgr/archive/18/efibootmgr-18.tar.gz
    sha256: 442867d12f8525034a404fc8af3036dba8e1fc970998af2486c3b940dfad0874
    md5: e170147da25e1d5f72721ffc46fe4e06

extract: ' xtar /sources/efibootmgr-18.tar.gz '

build: |
  make EFIDIR=ZLFS EFI_LOADER=systemd-bootaa64.efi

# real    0m15.415s
# user    0m19.550s
# sys     0m3.911s

install: |
  make install EFIDIR=ZLFS

# real    0m0.527s
# user    0m0.243s
# sys     0m0.275s

clean: ' cd ../ && rm -rf efibootmgr-18 '

required:
  - efivar
  - popt
