description: "The cURL package contains a utility and a library used for transferring files with URL syntax"

package:
  name: curl
  version: 8.18.0
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://curl.se/download/curl-8.18.0.tar.xz
    sha256: 40df79166e74aa20149365e11ee4c798a46ad57c34e4f68fd13100e2c9a91946
    md5: dae6088bf7af69d3b0a87c762de92248

extract: ' xtar /sources/curl-8.18.0.tar.xz '

prepare: |
  ./configure --prefix=/usr --with-openssl --with-ca-path=/etc/ssl/certs

# real    3m26.259s
# user    1m53.277s
# sys     1m37.832s


build: |
  make

# real    10m55.668s
# user    34m1.521s
# sys     6m45.216s

install: |
  make install

# real    0m12.611s
# user    0m7.888s
# sys     0m7.579s

final: |
  rm -rf docs/examples/.deps
  find docs \( -name Makefile\* -o -name \*.1 -o -name \*.3 -o -name CMakeLists.txt \) -delete
  cp -v -R docs -T /usr/share/doc/curl-8.18.0

clean: ' cd ../ && rm -rf curl-8.18.0 '

recommended:
  - libpsl
  - libidn2

optional:
  - brotli
  - c-ares
  - gnutls
  - make-ca
  - libssh2
  - mitkrb5
  - nghttp2
  - openldap
  - samba
  - apache
  - stunnel
  - openssh
  - valgrind
